name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to production
    runs-on: [self-hosted, linux, x64, inventory-production]
    timeout-minutes: 15
    environment:
      name: production
    steps:
      - name: Update application and restart service
        env:
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd /root/inventory_web/prod
          git pull --ff-only origin main
          ./scripts/deploy.sh "$DEPLOY_SHA"
